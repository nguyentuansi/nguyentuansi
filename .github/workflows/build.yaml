name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * *" # 05:00 Asia/Ho_Chi_Minh
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: cache/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update SVG files
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: nguyentuansi
        run: python today.py
      - name: Commit
        run: |-
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add cache/ dark_mode.svg light_mode.svg
          git commit -m "Update GitHub stats" || echo "No changes to commit"
          git push
